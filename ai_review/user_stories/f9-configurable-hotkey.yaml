metadata:
  feature: "f9-configurable-hotkey"
  description: "听写快捷键可配置——支持单修饰键按住说话和组合键 toggle"
  generated_at: "2026-04-14T00:00:00+08:00"
  git_ref: "6de0cc7"
  command: ".build/debug/VoiceDictation"
  screenshot_dir: "/tmp/voice-v03-qa/f9-configurable-hotkey"
  qa_note: "QA 前关闭主 VoiceDictation 实例避免全局热键冲突 (pkill -f VoiceDictation)"

stories:
  - name: "Settings 页进入快捷键录制状态"
    acceptance_criteria:
      - "打开主窗口 Settings tab，能看到'听写快捷键'项显示当前快捷键（默认右 Option）"
      - "点击录制控件后进入录制状态，控件 UI 提示'按下要录制的键'"

  - name: "录入单修饰键热加载生效"
    acceptance_criteria:
      - "录制状态下按 Fn 键并保存，Settings 显示当前快捷键为 Fn"
      - "不重启 app，按住 Fn 开始录音、松开停止，完整听写流程成功"
      - "原快捷键（右 Option）不再触发听写"

  - name: "录入组合键并以 toggle 模式工作"
    acceptance_criteria:
      - "录制状态下按 Ctrl+Space 并保存，Settings 显示当前快捷键为 Ctrl+Space"
      - "不重启 app，按一次 Ctrl+Space 开始录音（pill 浮现），再按一次 Ctrl+Space 停止并触发转录，清洗后文字注入焦点"
  - name: "冲突检测显示警告但允许保存"
    acceptance_criteria:
      - "录入已知被系统占用的快捷键（如 Cmd+Space）时，录制控件下方出现黄色警告文本提示冲突"
      - "保存按钮仍然可点，保存后配置生效"

  - name: "热加载不需要重启"
    acceptance_criteria:
      - "修改快捷键并保存后，不重启 app 即可用新键位触发听写"
      - "修改前正在进行的录音不被打断"
