metadata:
  feature: "f14-evaluation-mode"
  description: "评估 Tab——从历史样本池或现场录音选样本，并排对比两个 Provider 组合"
  generated_at: "2026-04-14T00:00:00+08:00"

stories:
  - name: "评估 Tab 入口可见"
    acceptance_criteria:
      - "打开主窗口，侧边栏能看到「评估」条目，位于「历史」/「词库」/「设置」等既有条目之间或下方"
      - "点击「评估」切换到评估视图，不出错不白屏"

  - name: "从历史样本池多选跑评估"
    acceptance_criteria:
      - "评估视图内进入「新建评估」，能看到已有历史音频样本列表（只显示有音频文件的条目，排除旧 legacy 条目）"
      - "勾选 2 条以上样本"
      - "选择两个不同的 Provider 组合（如 WhisperKit+GPT-4.1-mini vs whisper-1+GPT-4o-mini）"
      - "点击开始评估，N 样本 × 2 配置的表格在 60s 内展示完整结果（正常网络下）"

  - name: "现场录音作为评估样本不注入光标"
    acceptance_criteria:
      - "评估视图内选择「现场录音」方式添加样本"
      - "光标放在另一个 app 的文本框里（如 TextEdit），按评估视图的录音按钮说一句话停止"
      - "该文本框不出现任何注入文字"
      - "录音被加入样本池并可用于评估"

  - name: "对比表格 cell 展示完整信息"
    acceptance_criteria:
      - "完成一次评估后对比表格可见"
      - "每个 cell 至少包含：ASR 原文（带标签）、LLM 清洗文（带标签）、三段耗时（ASR / LLM / 总，单位 ms 或 s）、播放按钮图标"
      - "点击播放按钮能回放该样本原始音频"

  - name: "汇总区展示平均延迟对比"
    acceptance_criteria:
      - "对比表格下方或侧边有汇总区"
      - "展示配置 A 和配置 B 的平均总延迟（单位秒），两者并排或上下对比易于扫视"

  - name: "切换到配置按钮生效"
    acceptance_criteria:
      - "对比结果页面底部有「切换到配置 A」和「切换到配置 B」两个按钮"
      - "点击「切换到配置 A」后弹出确认或直接生效，Settings Tab 里的生效 Provider 组合变为配置 A"
      - "切换后进行一次日常听写（不在评估 Tab），实际使用的是切换后的配置"

  - name: "一配置失败另一侧不中断"
    acceptance_criteria:
      - "人为制造某 Provider 失败场景（如用错 API Key 配置一边）并跑评估"
      - "失败侧该 cell 显示错误原因（如 'Invalid API key' 或 'Timeout'），而不是空白或崩溃"
      - "另一侧成功的 cell 正常展示 ASR/LLM/耗时"

  - name: "评估运行持久化到历史评估列表"
    acceptance_criteria:
      - "完成一次评估后关闭对比视图"
      - "「历史评估运行」列表出现一条新记录，包含时间戳、样本数、两个配置名"
      - "点击该条记录能重新展开完整的对比表格（所有 cell 内容、汇总、切换按钮）"

  - name: "音频样本池 FIFO 淘汰与置顶保护"
    acceptance_criteria:
      - "手动触发样本池超过 50 条场景（例如连续听写 55 次，或在测试环境塞 55 条）"
      - "前 5 条按时间最老的样本的音频文件被删除（除非被置顶）"
      - "将某条样本置顶后，即使样本池继续超量，该条音频仍保留"
      - "置顶样本不计入 50 条额度（即 50 条非置顶 + 任意数量置顶）"
