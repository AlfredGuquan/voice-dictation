stories:
  - name: "保存新 API Key 后下次转录生效"
    acceptance_criteria:
      - "在 Settings 页填入一个有效的新 API Key 并点击保存"
      - "不重启 app，立即按热键录一段话，完整的录音→转录→清洗→注入流程用新 key 成功"
      - "网络请求 header 中 Authorization 字段为新 key（可通过日志或抓包验证）"

  - name: "保存无效 API Key 后下次转录触发鉴权错误"
    acceptance_criteria:
      - "在 Settings 页填入一个无效的 API Key 并保存"
      - "不重启 app，按热键录一段话，转录失败并按现有错误路径显示 toast/通知"
      - "错误信息指示鉴权失败（401 或类似）"

  - name: "保存瞬间不触发请求"
    acceptance_criteria:
      - "点击保存按钮时，不触发任何 OpenAI API 请求"
      - "新 key 仅在下一次主动触发听写时才被使用"
